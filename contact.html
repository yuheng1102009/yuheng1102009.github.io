<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CONTACT // SYSTEM LINK</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    font-family: "Arial", sans-serif;
    color: white;
  }

  /* Animated cyber grid background */
  body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image:
      linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,255,0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    transform: perspective(500px) rotateX(60deg);
    animation: moveGrid 10s linear infinite;
    top: -50%;
    left: -50%;
  }

  @keyframes moveGrid {
    from { transform: perspective(500px) rotateX(60deg) translateY(0); }
    to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
  }

  /* scanning line */
  body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #00f5ff, #ff00ff, transparent);
    top: 0;
    animation: scan 4s linear infinite;
    opacity: 0.7;
  }

  @keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  .card {
    position: relative;
    z-index: 10;
    width: 360px;
    padding: 35px;
    border-radius: 16px;
    background: rgba(10, 10, 20, 0.8);
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 20px #00f5ff, 0 0 60px #ff00ff;
    backdrop-filter: blur(12px);
    text-align: center;
  }

  /* GLITCH TITLE */
  .glitch {
    font-size: 26px;
    font-weight: bold;
    position: relative;
    color: #00f5ff;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 10px #00f5ff;
  }

  .glitch::before,
  .glitch::after {
    content: "NEON CONTACT";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    overflow: hidden;
  }

  .glitch::before {
    color: #ff00ff;
    animation: glitch1 2s infinite linear alternate-reverse;
  }

  .glitch::after {
    color: #00ff85;
    animation: glitch2 2s infinite linear alternate-reverse;
  }

  @keyframes glitch1 {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-4px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }

  @keyframes glitch2 {
    0% { transform: translate(0); }
    20% { transform: translate(2px, -2px); }
    40% { transform: translate(4px, 2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(-2px, 2px); }
    100% { transform: translate(0); }
  }

  .item {
    margin: 18px 0;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,255,255,0.1);
    transition: 0.3s;
  }

  .item:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00f5ff, 0 0 25px #ff00ff;
  }

  .label {
    font-size: 12px;
    color: #aaa;
    letter-spacing: 2px;
  }

  a {
    color: #ff00ff;
    text-decoration: none;
    font-weight: bold;
    text-shadow: 0 0 8px #ff00ff;
  }

  a:hover {
    color: #00ff85;
    text-shadow: 0 0 12px #00ff85;
  }

  /* terminal typing effect */
  .terminal {
    margin-top: 15px;
    font-size: 12px;
    color: #00ff85;
    font-family: monospace;
    opacity: 0.8;
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #00ff85;
    width: 0;
    animation: typing 4s steps(40) forwards, blink 0.8s infinite;
  }

  @keyframes typing {
    from { width: 0; }
    to { width: 100%; }
  }

  @keyframes blink {
    50% { border-color: transparent; }
  }
</style>
</head>

<body>

<div class="card">
  <div class="glitch">NEON CONTACT</div>

  <div class="item">
    <div class="label">EMAIL ACCESS NODE</div>
    <a href="mailto:liuyuheng582@gmail.com">liuyuheng582@gmail.com</a>
  </div>

  <div class="item">
    <div class="label">SOCIAL LINK STREAM</div>
    <a href="https://instagram.com/liuish_hen_.110" target="_blank">@liuish_hen_.110</a>
  </div>

  <div class="terminal">
    SYSTEM LINK ESTABLISHED... READY TO CONNECT █
  </div>
</div>

</body>
</html>
